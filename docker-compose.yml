version: '3.8'

services:
  bot:
    build: .
    container_name: fam-tree-bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN_ALPHA=${BOT_TOKEN_ALPHA}
      - BOT_TOKEN_BETA=${BOT_TOKEN_BETA}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/famtreebot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
      - ./assets:/app/assets

  db:
    image: postgres:15-alpine
    container_name: fam-tree-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=famtreebot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: fam-tree-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: fam-tree-celery
    restart: unless-stopped
    command: celery -A src.tasks worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/famtreebot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    container_name: fam-tree-celery-beat
    restart: unless-stopped
    command: celery -A src.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/famtreebot
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
